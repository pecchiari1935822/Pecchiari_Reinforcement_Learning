# ============================================================================
# BLADE OPTIMIZATION RL - SURROGATE MODEL CONFIGURATION
# ============================================================================
# Configurazione del surrogate aerodinamico (ANN keras)
# Questo modello predice gli OF (prestazioni) a partire dai DOF (parametri geometrici)

project:
  name: "Blade_Optimization_RL"
  step: 999
  surrogate_type: "feedforward_mlp"
  description: "Trained ANN surrogate for aerodynamic performance prediction"

# ============================================================================
# MODEL PATHS
# ============================================================================

paths:
  model_file: "STEP_999/ANN/models/best_model.keras"
  scaler_X_file: "STEP_999/ANN/scalers/scaler_X.joblib"    # DOF scaler
  scaler_y_file: "STEP_999/ANN/scalers/scaler_y.joblib"    # OF scaler
  training_history_file: "STEP_999/ANN/training_history.csv"
  evaluation_report_file: "STEP_999/ANN/evaluation_report.json"

# ============================================================================
# DATA SPECIFICATIONS
# ============================================================================

data:
  input:
    name: "DOF (Design of Freedom)"
    dimension: 7
    variables:
      - name: "PITCH"
        description: "Pitch angle"
        unit: "deg"
      - name: "TWIST_A"
        description: "Twist section A"
        unit: "deg"
      - name: "TWIST_B"
        description: "Twist section B"
        unit: "deg"
      - name: "CHORD"
        description: "Chord length ratio"
        unit: "-"
      - name: "OFFSET_X"
        description: "X offset"
        unit: "m"
      - name: "OFFSET_Y"
        description: "Y offset"
        unit: "m"
      - name: "OFFSET_Z"
        description: "Z offset"
        unit: "m"
  
  output:
    name: "OF (Objective Functions)"
    dimension: 15
    variables:
      - name: "CSI"
        description: "Coefficient of Structural Improvement"
        unit: "-"
        minimize: true
      - name: "Efficiency"
        description: "Aerodynamic efficiency"
        unit: "-"
        maximize: true
      - name: "Drag"
        description: "Drag coefficient"
        unit: "-"
        minimize: true
      # ... altri 12 OF ...
  
  # Statistiche del dataset di training
  dataset_statistics:
    n_samples: null                  # Calcolato automaticamente da database.dat
    n_training: null
    n_validation: null
    n_test: null
    
    # Range dei dati (per normalization)
    dof_ranges:
      PITCH:
        min: -25.0
        max: 25.0
        mean: 0.0
        std: 10.0
      TWIST_A:
        min: -10.0
        max: 10.0
      TWIST_B:
        min: -10.0
        max: 10.0
      CHORD:
        min: 0.8
        max: 1.2
      OFFSET_X:
        min: -0.05
        max: 0.05
      OFFSET_Y:
        min: -0.05
        max: 0.05
      OFFSET_Z:
        min: -0.05
        max: 0.05
    
    of_ranges:
      CSI:
        min: 0.0
        max: 100.0
        mean: 50.0
        std: 20.0
      Efficiency:
        min: 0.0
        max: 1.0
      Drag:
        min: 0.0
        max: 1.0

# ============================================================================
# NETWORK ARCHITECTURE
# ============================================================================

architecture:
  
  type: "feedforward_mlp"            # Multi-Layer Perceptron
  framework: "tensorflow_keras"
  
  layers:
    - type: "input"
      units: 7                        # Input dimension = n_DOF
    
    - type: "dense"
      units: 128
      activation: "relu"
      dropout: 0.1
      batch_norm: true
    
    - type: "dense"
      units: 128
      activation: "relu"
      dropout: 0.1
      batch_norm: true
    
    - type: "dense"
      units: 64
      activation: "relu"
      dropout: 0.05
      batch_norm: false
    
    - type: "output"
      units: 15                       # Output dimension = n_OF
      activation: "linear"            # No activation for regression
  
  total_parameters: null              # Calcolato dalla rete
  
  # Regularization
  regularization:
    type: "l2"
    factor: 0.001
    dropout_rate: 0.1
  
  # Initialization
  kernel_initializer: "he_normal"
  bias_initializer: "zeros"

# ============================================================================
# TRAINING CONFIGURATION
# ============================================================================

training:
  
  # Optimizer
  optimizer:
    type: "adam"
    learning_rate: 0.001
    beta_1: 0.9
    beta_2: 0.999
    epsilon: 1e-7
  
  # Loss function
  loss:
    type: "mse"                      # Mean Squared Error per regression
  
  # Metrics durante training
  metrics:
    - "mse"
    - "mae"
    - "r2_score"
  
  # Training hyperparameters
  batch_size: 32
  epochs: 200
  validation_split: 0.1
  shuffle: true
  
  # Early stopping
  early_stopping:
    enabled: true
    monitor: "val_loss"
    patience: 20                      # Stop se 20 epoch senza miglioramento
    restore_best_weights: true
  
  # Learning rate scheduling
  lr_scheduling:
    enabled: true
    type: "exponential_decay"
    initial_lr: 0.001
    decay_rate: 0.95
    decay_steps: 10                   # Ogni 10 epoch
  
  # Callbacks
  callbacks:
    tensorboard:
      enabled: true
      log_dir: "STEP_999/ANN/logs"
    
    checkpoint:
      enabled: true
      save_best_only: true
      monitor: "val_loss"
      filepath: "STEP_999/ANN/models/checkpoint_{epoch:03d}.h5"

# ============================================================================
# INPUT PREPROCESSING
# ============================================================================

input_preprocessing:
  
  type: "standardscaler"             # StandardScaler (zscore) o MinMaxScaler
  
  scaling_parameters:
    method: "standardscaler"
    
    # Se StandardScaler (zscore):
    mean: null                        # Calcolato dal training set
    std: null
    
    # Se MinMaxScaler:
    feature_min: null
    feature_max: null
    feature_range: [-1, 1]
  
  # Handle missing values
  missing_value_strategy: "drop"      # 'drop', 'mean', 'forward_fill'
  
  # Outlier handling
  outlier_detection:
    enabled: true
    method: "iqr"                    # 'iqr', 'zscore'
    threshold_iqr: 1.5
    threshold_zscore: 3.0
    action: "drop"                   # 'drop', 'clip'

# ============================================================================
# OUTPUT POSTPROCESSING
# ============================================================================

output_postprocessing:
  
  type: "standardscaler"
  
  scaling_parameters:
    method: "standardscaler"
    mean: null
    std: null
  
  # Clipping (assicurare che output sia realistico)
  clipping:
    enabled: true
    
    clips:
      CSI:
        min: 0.0
        max: 100.0
      Efficiency:
        min: 0.0
        max: 1.0
      Drag:
        min: 0.0
        max: 1.0
  
  # Handle predictions outside feasible region
  feasibility_check:
    enabled: false
    method: "projection"             # 'projection', 'flag'

# ============================================================================
# EVALUATION METRICS
# ============================================================================

evaluation:
  
  metrics_computed:
    - "rmse"                         # Root Mean Squared Error
    - "mae"                          # Mean Absolute Error
    - "r2_score"                     # R-squared
    - "correlation"
    - "max_error"
  
  # Valutazione per output
  per_output_metrics:
    enabled: true
    
    metrics_per_of:
      CSI:
        - "rmse"
        - "mae"
        - "r2_score"
      Efficiency:
        - "rmse"
        - "mae"
        - "r2_score"
      Drag:
        - "rmse"
        - "mae"
        - "r2_score"
  
  # Threshold di accettabilità
  acceptance_criteria:
    overall_r2: 0.9                  # R² overall deve essere > 0.9
    overall_rmse: 5.0                # RMSE overall deve essere < 5
    per_output_r2:
      CSI: 0.85
      Efficiency: 0.90
      Drag: 0.88
  
  # Valutazione su diversi dataset
  validation_sets:
    - name: "test_set"
      split: "test"
    - name: "validation_set"
      split: "validation"
    - name: "cross_validation"
      n_folds: 5

# ============================================================================
# SURROGATE USAGE CONSTRAINTS
# ============================================================================
# Limitazioni su come usare il surrogate durante RL

usage:
  
  # Fiducia nel surrogate
  trust_region:
    enabled: true
    type: "distance_based"
    max_dof_distance: 0.5            # Max distanza dai dati training
  
  # Utilizzo predizioni
  prediction_caching:
    enabled: true                    # Cache risultati surrogate?
    cache_size: 1000
  
  # Batch prediction
  batch_prediction:
    enabled: true
    batch_size: 32                   # Predizioni batch per efficienza
  
  # Prediction frequency
  call_frequency: "every_step"       # 'every_step', 'every_n_steps'
  call_frequency_n: 1

# ============================================================================
# MODEL VALIDATION & TESTING
# ============================================================================

validation:
  
  # Cross-validation durante training
  cross_validation:
    enabled: true
    n_folds: 5
    shuffle: true
  
  # Test set evaluation
  test_set_evaluation:
    enabled: true
    compute_detailed_metrics: true
  
  # Out-of-distribution detection
  ood_detection:
    enabled: false
    method: "mahalanobis_distance"
    threshold: 3.0
  
  # Sensitivity analysis
  sensitivity_analysis:
    enabled: false
    parameters: ["PITCH", "CHORD"]   # Quali DOF analizzare?
    n_samples: 100

# ============================================================================
# REPRODUCIBILITY & VERSIONING
# ============================================================================

reproducibility:
  
  # Training seed
  random_seed: 42
  numpy_seed: 42
  tensorflow_seed: 42
  
  # Model versioning
  version: "1.0"
  date_trained: "2026-05-11"
  training_duration: null            # Calcolato dopo training
  
  # Save training config
  save_config: true
  config_path: "STEP_999/ANN/training_config.yaml"

# ============================================================================
# PERFORMANCE MONITORING
# ============================================================================

monitoring:
  
  # Durante inference
  inference_monitoring:
    track_prediction_time: true
    track_prediction_variance: true
    log_predictions: false            # Loggare tutte le predizioni? (CPU intensive)
  
  # Degradation detection
  degradation_detection:
    enabled: false
    method: "prediction_variance"
    threshold: 0.2
