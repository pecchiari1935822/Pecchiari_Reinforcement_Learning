# ============================================================================
# BLADE OPTIMIZATION RL - CONSTRAINTS CONFIGURATION
# ============================================================================
# Definisce vincoli fisici sui DOF e sugli obiettivi (OF)
# Questi vincoli vengono usati durante training e valutazione

project:
  name: "Blade_Optimization_RL"
  step: 999
  constraints_type: "standard"

# ============================================================================
# DOF CONSTRAINTS (Vincoli sui parametri di progetto)
# ============================================================================
# Questi vincoli sono HARD (sempre applicati durante ottimizzazione)

dof_constraints:
  
  PITCH:
    enabled: true
    type: "bound"
    description: "Pitch angle (gradi)"
    min: -25.0
    max: 25.0
    step_size: 1.0               # Per discrete action space (opzionale)
  
  TWIST_A:
    enabled: true
    type: "bound"
    description: "Twist section A (gradi)"
    min: -10.0
    max: 10.0
    step_size: 0.5
  
  TWIST_B:
    enabled: true
    type: "bound"
    description: "Twist section B (gradi)"
    min: -10.0
    max: 10.0
    step_size: 0.5
  
  CHORD:
    enabled: true
    type: "bound"
    description: "Chord length (fattore moltiplicativo)"
    min: 0.8
    max: 1.2
    step_size: 0.02
  
  OFFSET_X:
    enabled: true
    type: "bound"
    description: "Offset in X direction (m)"
    min: -0.05
    max: 0.05
    step_size: 0.005
  
  OFFSET_Y:
    enabled: true
    type: "bound"
    description: "Offset in Y direction (m)"
    min: -0.05
    max: 0.05
    step_size: 0.005
  
  OFFSET_Z:
    enabled: true
    type: "bound"
    description: "Offset in Z direction (m)"
    min: -0.05
    max: 0.05
    step_size: 0.005

# ============================================================================
# RELATIONSHIP CONSTRAINTS (Vincoli di relazione tra DOF)
# ============================================================================
# Vincoli che coinvolgono relazioni tra più DOF

relationship_constraints:
  
  - name: "twist_compatibility"
    enabled: false
    description: "TWIST_A e TWIST_B devono avere segni compatibili"
    constraint: "sign(TWIST_A) == sign(TWIST_B) OR TWIST_A == 0 OR TWIST_B == 0"
    penalty_weight: 0.5
  
  - name: "chord_offset_consistency"
    enabled: false
    description: "Se CHORD cambia molto, OFFSET deve essere limitato"
    constraint: "IF CHORD < 0.85 THEN OFFSET_X < 0.02"
    penalty_weight: 0.3

# ============================================================================
# OBJECTIVE FUNCTION CONSTRAINTS (Vincoli sugli OF)
# ============================================================================
# Questi sono vincoli SOFT (morbidi, con penalità nel reward)

objective_constraints:
  
  CSI:
    enabled: true
    type: "soft_bound"
    description: "Coefficient of Structural Improvement"
    min: 0.0
    max: 100.0
    acceptable_range: [0.0, 80.0]  # Range accettabile per reward positivo
    violation_penalty: 0.2
  
  Efficiency:
    enabled: true
    type: "soft_bound"
    description: "Aerodinamic efficiency"
    min: 0.0
    max: 1.0
    acceptable_range: [0.3, 0.95]
    violation_penalty: 0.15
  
  Drag:
    enabled: true
    type: "soft_bound"
    description: "Drag coefficient"
    min: 0.0
    max: 1.0
    acceptable_range: [0.0, 0.7]
    violation_penalty: 0.15

# ============================================================================
# IMPROVEMENT TARGETS (Target di miglioramento)
# ============================================================================
# Quali sono i target di miglioramento per ogni OF rispetto al baseline?

improvement_targets:
  
  CSI:
    enabled: true
    improvement_minimum: 0.05      # Almeno 5% miglioramento
    improvement_desired: 0.15      # Target desiderato 15%
    weight_in_reward: 0.6
  
  Efficiency:
    enabled: true
    improvement_minimum: 0.02
    improvement_desired: 0.10
    weight_in_reward: 0.3
  
  Drag:
    enabled: true
    improvement_minimum: 0.03
    improvement_desired: 0.12
    weight_in_reward: 0.1

# ============================================================================
# PENALTY WEIGHTS (Pesi delle penalità nel reward)
# ============================================================================

penalties:
  
  # Penalità per violazione vincoli DOF
  dof_violation_penalty: 1.0
  
  # Penalità per violazione vincoli OF
  objective_violation_penalty: 0.5
  
  # Penalità per violazione vincoli di relazione
  relationship_violation_penalty: 0.3
  
  # Penalità per azioni che non migliorano
  no_improvement_penalty: 0.1
  
  # Penalità per azioni troppo aggressive
  large_step_penalty: 0.05

# ============================================================================
# SAFETY CONSTRAINTS (Vincoli di sicurezza)
# ============================================================================
# Vincoli per evitare configurazioni irrealistiche

safety_constraints:
  
  - name: "no_zero_chord"
    enabled: true
    description: "CHORD non può andare a 0"
    min_allowed: 0.5              # Minimo 50% della chord originale
  
  - name: "max_deflection"
    enabled: true
    description: "Massimo movimento dell'ala nel singolo step"
    max_step_size: 2.0             # Max 2 gradi per PITCH/TWIST
  
  - name: "structural_integrity"
    enabled: false
    description: "Controllare che il profilo non sia strutturalmente compromesso"
    check_function: "custom_structural_check"

# ============================================================================
# CONSTRAINT VIOLATION HANDLING (Come gestire violazioni)
# ============================================================================

violation_handling:
  
  hard_constraints:
    action: "clamp"                 # 'clamp' o 'reject'
    description: "Vincoli duri (DOF bounds) vengono sempre clamped"
  
  soft_constraints:
    action: "penalize"              # 'penalize' o 'encourage'
    penalty_scaling: "linear"       # 'linear', 'quadratic', 'exponential'
    description: "Vincoli morbidi (OF) vengono penalizzati nel reward"
  
  relationship_constraints:
    action: "penalize"
    penalty_scaling: "quadratic"

# ============================================================================
# CONSTRAINT CHECKING FREQUENCY
# ============================================================================

checking:
  check_on_step: true              # Controllare ad ogni step
  check_on_episode: true            # Controllare a fine episodio
  warning_threshold: 0.8            # Avviso se 80% delle azioni violano vincoli
  error_threshold: 0.95             # Errore se 95% delle azioni violano vincoli

# ============================================================================
# RELAXATION (Rilassamento vincoli durante training)
# ============================================================================
# Opzionale: rilassare gradualmente i vincoli durante training

relaxation:
  enabled: false
  
  # Fase 1: Fase iniziale - vincoli rilassati
  phase_1:
    timesteps_start: 0
    timesteps_end: 10000
    dof_margin: 0.2                 # 20% di margine dai bounds
    violation_penalty_scale: 0.5    # Penalità ridotta al 50%
  
  # Fase 2: Fase intermedia - vincoli normali
  phase_2:
    timesteps_start: 10000
    timesteps_end: 50000
    dof_margin: 0.1
    violation_penalty_scale: 1.0
  
  # Fase 3: Fase finale - vincoli stretti
  phase_3:
    timesteps_start: 50000
    timesteps_end: null             # Fino alla fine
    dof_margin: 0.0
    violation_penalty_scale: 1.5    # Penalità aumentata
